openapi: 3.0.3
info:
  title: Maven Host API
  version: 1.0.0
  description: |-
    REST API for Maven Host by Inara Crest Technologies.

    Your Trusted Domain and Hosting Partner.
  contact:
    name: Inara Crest Technologies
    email: support@inaracresttechnologies.com
  license:
    name: Proprietary
paths:
  /api/v1/auth/login/:
    post:
      operationId: auth_login_create
      description: Authenticate a user and return JWT tokens.
      tags:
      - auth
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/auth/logout/:
    post:
      operationId: auth_logout_create
      description: Blacklist a refresh token and terminate the session.
      tags:
      - auth
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/me/:
    get:
      operationId: auth_me_retrieve
      description: Return information about the authenticated user.
      tags:
      - auth
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/refresh/:
    post:
      operationId: auth_refresh_create
      description: |-
        Exchange a valid refresh token for a new access token.

        Refresh token rotation and blacklisting are handled
        automatically by the SimpleJWT configuration.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/auth/register/:
    post:
      operationId: auth_register_create
      description: Register a new user.
      tags:
      - auth
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/auth/resend-verification/:
    post:
      operationId: auth_resend_verification_create
      description: Send a new verification email.
      tags:
      - auth
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/verify-email/:
    post:
      operationId: auth_verify_email_create
      description: Verify a user's email address.
      tags:
      - auth
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          description: No response body
components:
  schemas:
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
    TokenRefreshRequest:
      type: object
      properties:
        refresh:
          type: string
          minLength: 1
      required:
      - refresh
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
